<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D132D">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="POTUS Studio">
<title>POTUS Studio</title>
<style>
:root{
  --navy:#0D132D; --navy2:#10244A; --navy3:#16203f;
  --cream:#F7F3E8; --offwhite:#F5F5F5;
  --red:#B22234; --gold:#C9A227; --gold2:#D4AF37; --blue:#1B4D8F; --blue2:#2c66b0;
  --white:#FFFFFF;
  --ink:#0D132D;
  --glass:rgba(255,255,255,.055);
  --glass-strong:rgba(255,255,255,.085);
  --hair:rgba(201,162,39,.30);
  --hair-soft:rgba(255,255,255,.12);
  --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:18px;
  --shadow:0 18px 50px -22px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%; text-size-adjust:100%}
:where(button,a,input,select,.opt,.tile,.pcard,.chunk,.themecard,.tlseg,.seqrow .mv button){-webkit-tap-highlight-color:transparent; touch-action:manipulation}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--offwhite);
  background:
    radial-gradient(1200px 700px at 50% -10%, #1a2a55 0%, rgba(26,42,85,0) 60%),
    radial-gradient(900px 600px at 90% 110%, #122046 0%, rgba(18,32,70,0) 55%),
    linear-gradient(180deg,#0b1024 0%, var(--navy) 40%, #0a1130 100%);
  background-attachment:fixed;
  min-height:100vh; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
/* faint star field + stripe texture */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
  background-image:
    radial-gradient(1.4px 1.4px at 20% 30%, rgba(255,255,255,.18) 50%, transparent 51%),
    radial-gradient(1.2px 1.2px at 70% 18%, rgba(255,255,255,.13) 50%, transparent 51%),
    radial-gradient(1.3px 1.3px at 42% 72%, rgba(255,255,255,.10) 50%, transparent 51%),
    radial-gradient(1.1px 1.1px at 85% 60%, rgba(255,255,255,.12) 50%, transparent 51%),
    radial-gradient(1.2px 1.2px at 12% 84%, rgba(255,255,255,.10) 50%, transparent 51%);
}
.wrap{position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:0 20px calc(80px + env(safe-area-inset-bottom))}

/* ---------- top bar ---------- */
header{position:sticky; top:0; z-index:30; backdrop-filter:blur(10px); padding-top:env(safe-area-inset-top);
  background:linear-gradient(180deg,rgba(8,12,30,.86),rgba(8,12,30,.42));
  border-bottom:1px solid var(--hair)}
.bar{max-width:1080px; margin:0 auto; padding:12px 20px; display:flex; align-items:center; gap:14px}
.brand{display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--cream)}
.crest{width:38px; height:38px; flex:none; filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.brand h1{font-family:var(--serif); font-weight:700; font-size:1.32rem; margin:0; letter-spacing:.3px;
  color:var(--cream)}
.brand h1 span{color:var(--gold2)}
.brand small{display:block; font-size:.62rem; letter-spacing:.32em; text-transform:uppercase;
  color:rgba(247,243,232,.55); font-family:var(--sans); margin-top:1px}
.spacer{flex:1}
.statchip{display:flex; gap:14px; align-items:center; font-size:.74rem; color:rgba(247,243,232,.78)}
.statchip b{font-family:var(--serif); font-size:1.05rem; color:var(--gold2); display:block; line-height:1}
.statchip .s{text-align:center}
.statchip .lab{font-size:.56rem; letter-spacing:.14em; text-transform:uppercase; color:rgba(247,243,232,.5)}

/* nav */
nav.modes{max-width:1080px; margin:0 auto; padding:0 14px 10px; display:flex; gap:6px; flex-wrap:wrap}
.modes button{font-family:var(--sans); font-size:.82rem; color:rgba(247,243,232,.72);
  background:transparent; border:1px solid transparent; padding:8px 14px; border-radius:999px; cursor:pointer;
  transition:.18s}
.modes button:hover{color:var(--cream); background:rgba(255,255,255,.05)}
.modes button.active{color:var(--navy); background:linear-gradient(180deg,var(--gold2),var(--gold));
  font-weight:600; box-shadow:0 6px 18px -8px rgba(201,162,39,.7)}

/* ---------- panels ---------- */
.panel{background:var(--glass); border:1px solid var(--hair-soft); border-radius:var(--r);
  box-shadow:var(--shadow); backdrop-filter:blur(14px); padding:24px}
.panel + .panel{margin-top:18px}
.eyebrow{font-size:.66rem; letter-spacing:.28em; text-transform:uppercase; color:var(--gold2);
  font-weight:600; margin:0 0 6px}
h2.display{font-family:var(--serif); font-weight:700; font-size:clamp(1.5rem,3.4vw,2.2rem);
  margin:.1em 0 .3em; color:var(--cream); line-height:1.1}
.sub{color:rgba(247,243,232,.66); font-size:.95rem; max-width:60ch}
.hr{height:1px; background:linear-gradient(90deg,transparent,var(--hair),transparent); margin:20px 0; border:0}

.btn{font-family:var(--sans); font-size:.92rem; font-weight:600; cursor:pointer; border-radius:12px;
  padding:12px 20px; border:1px solid transparent; transition:.16s; color:var(--white); min-height:44px}
.btn.primary{background:linear-gradient(180deg,var(--blue2),var(--blue)); box-shadow:0 8px 22px -10px rgba(27,77,143,.9)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.gold{background:linear-gradient(180deg,var(--gold2),var(--gold)); color:var(--navy)}
.btn.gold:hover{filter:brightness(1.06)}
.btn.ghost{background:rgba(255,255,255,.04); border-color:var(--hair-soft); color:var(--cream)}
.btn.ghost:hover{background:rgba(255,255,255,.09)}
.btn:focus-visible,button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--gold2); outline-offset:2px}
.btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px}

.seg{display:inline-flex; gap:4px; padding:4px; background:rgba(0,0,0,.25); border:1px solid var(--hair-soft); border-radius:12px; flex-wrap:wrap}
.seg button{font-family:var(--sans); font-size:.8rem; color:rgba(247,243,232,.7); background:transparent; border:0;
  padding:8px 13px; border-radius:9px; cursor:pointer; transition:.15s}
.seg button.on{background:linear-gradient(180deg,var(--gold2),var(--gold)); color:var(--navy); font-weight:600}
.cfg-label{font-size:.66rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(247,243,232,.5); margin:18px 0 8px}

/* ---------- home tiles ---------- */
.tiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; margin-top:6px}
.tile{text-align:left; cursor:pointer; background:var(--glass); border:1px solid var(--hair-soft);
  border-radius:14px; padding:18px; transition:.18s; color:var(--cream); font-family:var(--sans)}
.tile:hover{transform:translateY(-3px); border-color:var(--hair); background:var(--glass-strong)}
.tile .ic{width:30px; height:30px; margin-bottom:12px; color:var(--gold2)}
.tile h3{font-family:var(--serif); font-size:1.12rem; margin:0 0 5px; color:var(--cream)}
.tile p{margin:0; font-size:.82rem; color:rgba(247,243,232,.62)}

.hero{display:flex; gap:26px; align-items:center; flex-wrap:wrap}
.hero .big{font-family:var(--serif); font-size:clamp(3.4rem,12vw,6rem); line-height:.85; color:var(--gold2);
  text-shadow:0 6px 30px rgba(201,162,39,.25)}
.hero .big small{display:block; font-size:.18em; letter-spacing:.3em; text-transform:uppercase; color:rgba(247,243,232,.55); margin-top:10px; font-family:var(--sans)}

/* ---------- quiz ---------- */
.q-card{text-align:center}
.q-prompt{font-family:var(--serif); font-size:clamp(1.4rem,4vw,2rem); color:var(--cream); margin:8px 0 4px}
.q-portrait{width:130px; height:130px; border-radius:12px; object-fit:cover; margin:8px auto 4px; display:block;
  border:2px solid var(--gold); box-shadow:0 0 0 4px rgba(201,162,39,.12), var(--shadow)}
.ord-big{font-family:var(--serif); font-size:clamp(3rem,12vw,5.5rem); color:var(--gold2); line-height:1}
.opts{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px auto 0; max-width:520px}
.opt{font-family:var(--sans); font-size:1rem; padding:15px; border-radius:12px; cursor:pointer;
  background:rgba(255,255,255,.045); border:1px solid var(--hair-soft); color:var(--cream); transition:.14s}
.opt:hover:not(:disabled){background:rgba(255,255,255,.1); border-color:var(--hair)}
.opt.correct{background:linear-gradient(180deg,rgba(201,162,39,.32),rgba(201,162,39,.16)); border-color:var(--gold2);
  box-shadow:0 0 22px -4px rgba(201,162,39,.5); color:var(--white)}
.opt.wrong{background:linear-gradient(180deg,rgba(178,34,52,.32),rgba(178,34,52,.15)); border-color:var(--red); color:#ffd9dd}
.opt:disabled{cursor:default}
.typein{display:flex; gap:8px; max-width:420px; margin:18px auto 0}
.typein input{flex:1; font-family:var(--sans); font-size:1rem; padding:13px 15px; border-radius:11px;
  background:rgba(0,0,0,.28); border:1px solid var(--hair-soft); color:var(--white)}
.feedback{margin-top:18px; min-height:24px; font-size:.95rem}
.feedback .ok{color:var(--gold2)} .feedback .no{color:#f3a3ab}
.progressbar{height:5px; background:rgba(255,255,255,.08); border-radius:99px; overflow:hidden; margin-bottom:18px}
.progressbar i{display:block; height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); transition:width .3s}

/* ---------- flashcard ---------- */
.flash{perspective:1400px; max-width:420px; margin:0 auto}
.flash-inner{position:relative; width:100%; aspect-ratio:3/4; transition:transform .55s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d; cursor:pointer}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.face{position:absolute; inset:0; backface-visibility:hidden; border-radius:16px; border:1px solid var(--hair);
  background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.03)); backdrop-filter:blur(10px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center}
.face.back{transform:rotateY(180deg); justify-content:flex-start; overflow:auto}
.face .num{font-family:var(--serif); font-size:4.5rem; color:var(--gold2); line-height:1}
.face .nm{font-family:var(--serif); font-size:1.5rem; color:var(--cream); margin-top:6px}
.face .hint{font-size:.8rem; color:rgba(247,243,232,.55); margin-top:14px}
.face.back img{width:96px; height:96px; border-radius:10px; object-fit:cover; border:2px solid var(--gold); margin-bottom:10px}
.kv{font-size:.84rem; color:rgba(247,243,232,.8); text-align:left; width:100%; margin:2px 0}
.kv b{color:var(--gold2); font-weight:600}

/* ---------- browse ---------- */
.tools{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px}
.tools input,.tools select{font-family:var(--sans); font-size:.86rem; padding:10px 12px; border-radius:10px;
  background:rgba(0,0,0,.28); border:1px solid var(--hair-soft); color:var(--white)}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(132px,1fr)); gap:12px}
.pcard{cursor:pointer; background:var(--glass); border:1px solid var(--hair-soft); border-radius:13px;
  padding:12px; text-align:center; transition:.16s}
.pcard:hover{transform:translateY(-3px); border-color:var(--hair); background:var(--glass-strong)}
.pcard img{width:78px; height:78px; border-radius:9px; object-fit:cover; border:2px solid var(--gold);
  box-shadow:0 0 0 3px rgba(201,162,39,.1)}
.pcard .o{font-family:var(--serif); color:var(--gold2); font-size:1.1rem; margin-top:8px}
.pcard .n{font-size:.78rem; color:var(--cream); line-height:1.2; margin-top:2px}
.pcard .y{font-size:.66rem; color:rgba(247,243,232,.5)}

/* detail */
.detail{display:flex; gap:24px; flex-wrap:wrap}
.detail .frame{flex:none}
.detail .frame img{width:200px; height:240px; object-fit:cover; border-radius:12px; border:3px solid var(--gold);
  box-shadow:0 0 0 6px rgba(201,162,39,.1), var(--shadow)}
.detail .meta{flex:1; min-width:260px}
.ord-pill{display:inline-block; font-family:var(--serif); font-size:.95rem; color:var(--navy);
  background:linear-gradient(180deg,var(--gold2),var(--gold)); padding:3px 12px; border-radius:99px; font-weight:700; margin-right:6px}
.facts{display:grid; grid-template-columns:auto 1fr; gap:6px 16px; margin-top:14px; font-size:.9rem}
.facts dt{color:var(--gold2); font-weight:600} .facts dd{margin:0; color:var(--cream)}
.events{margin:16px 0 0; padding-left:18px} .events li{margin:4px 0; color:rgba(247,243,232,.85); font-size:.9rem}
.hookbox{margin-top:14px; padding:12px 14px; border-left:3px solid var(--gold); background:rgba(201,162,39,.08);
  border-radius:0 10px 10px 0; font-size:.9rem; color:var(--cream)}
.compare{margin-top:18px}
.cbar{margin:10px 0}
.cbar .lab{display:flex; justify-content:space-between; font-size:.74rem; color:rgba(247,243,232,.65); margin-bottom:4px}
.cbar .track{height:11px; background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden}
.cbar .fill{height:100%; border-radius:99px; background:linear-gradient(90deg,var(--blue),var(--blue2))}
.cbar.gold .fill{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.cbar.red .fill{background:linear-gradient(90deg,#8e1b2a,var(--red))}

/* ---------- sequence ---------- */
.seqlist{display:flex; flex-direction:column; gap:8px; max-width:560px; margin:0 auto}
.seqrow{display:flex; align-items:center; gap:12px; background:var(--glass); border:1px solid var(--hair-soft);
  border-radius:12px; padding:10px 12px}
.seqrow.sel{border-color:var(--gold2); box-shadow:0 0 0 1px var(--gold2)}
.seqrow.ok{border-color:var(--gold); background:rgba(201,162,39,.12)}
.seqrow.bad{border-color:var(--red); background:rgba(178,34,52,.12)}
.seqrow img{width:42px; height:42px; border-radius:8px; object-fit:cover; border:1px solid var(--gold)}
.seqrow .nm{flex:1; font-size:.95rem; color:var(--cream)}
.seqrow .mv{display:flex; flex-direction:column; gap:2px}
.seqrow .mv button{width:30px; height:22px; border-radius:6px; border:1px solid var(--hair-soft);
  background:rgba(255,255,255,.05); color:var(--cream); cursor:pointer; line-height:1; font-size:.7rem}
.seqrow .mv button:hover{background:rgba(255,255,255,.12)}
.seqrow .badge{font-family:var(--serif); color:var(--gold2); width:26px; text-align:center}

/* ---------- srs ---------- */
.boxes{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:6px 0 18px}
.boxes .b{flex:1; min-width:70px; text-align:center; background:var(--glass); border:1px solid var(--hair-soft);
  border-radius:10px; padding:10px 6px}
.boxes .b b{font-family:var(--serif); font-size:1.4rem; color:var(--gold2); display:block}
.boxes .b span{font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:rgba(247,243,232,.55)}

.empty{text-align:center; color:rgba(247,243,232,.7); padding:30px 10px}
.empty .ic{width:46px;height:46px;color:var(--gold2);margin-bottom:10px}

.note{font-size:.78rem; color:rgba(247,243,232,.5); margin-top:10px}
.kbd{font-size:.7rem; color:rgba(247,243,232,.45); margin-top:16px; text-align:center}
.center{text-align:center}
footer{text-align:center; padding:30px 0 0; color:rgba(247,243,232,.4); font-size:.74rem}
footer .crestmini{width:20px;height:20px;vertical-align:-5px;margin-right:6px;opacity:.7}

/* ---------- timeline hero ---------- */
.timeline{display:flex; align-items:stretch; gap:2px; overflow-x:auto; padding:20px 2px 6px; scrollbar-width:thin; -webkit-overflow-scrolling:touch; overscroll-behavior-x:contain; scroll-snap-type:x proximity}
.timeline::-webkit-scrollbar{height:7px}
.timeline::-webkit-scrollbar-thumb{background:var(--hair); border-radius:9px}
.tlseg{flex:0 0 auto; border:0; border-radius:6px 6px 0 0; cursor:pointer; position:relative; height:76px;
  display:flex; align-items:flex-end; justify-content:center; padding-bottom:5px; color:#fff;
  font-family:var(--serif); font-size:.78rem; transition:.15s; box-shadow:inset 0 -2px 0 rgba(0,0,0,.2)}
.tlseg:hover,.tlseg:focus-visible{transform:translateY(-3px); filter:brightness(1.18); outline:none}
.tlseg .tlnum{text-shadow:0 1px 2px rgba(0,0,0,.65)}
.tlseg.nc::after{content:"\21A9"; position:absolute; top:-15px; left:50%; transform:translateX(-50%); color:var(--gold2); font-size:.74rem}
.tlhint{font-size:.74rem; color:rgba(247,243,232,.5); margin-top:10px}
.tllegend{display:flex; gap:8px 15px; flex-wrap:wrap; margin-top:12px; font-size:.72rem; color:rgba(247,243,232,.72)}
.tllegend span{white-space:nowrap}
.tllegend i{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px}
/* ---------- learn ---------- */
.chunks{display:grid; grid-template-columns:repeat(auto-fill,minmax(148px,1fr)); gap:12px}
.chunk{cursor:pointer; background:var(--glass); border:1px solid var(--hair-soft); border-radius:13px; padding:16px; transition:.16s; position:relative; text-align:left; color:var(--cream); font-family:var(--sans)}
.chunk:hover{transform:translateY(-3px); border-color:var(--hair); background:var(--glass-strong)}
.chunk .rng{font-family:var(--serif); font-size:1.45rem; color:var(--gold2)}
.chunk .who{font-size:.75rem; color:rgba(247,243,232,.6); margin-top:4px; line-height:1.3}
.chunk .done{position:absolute; top:10px; right:12px; color:var(--gold2); font-size:1rem}
.learnrow{display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--hair-soft)}
.learnrow:last-child{border-bottom:0}
.learnrow img{width:58px; height:58px; border-radius:9px; object-fit:cover; border:2px solid var(--gold); flex:none}
.learnrow .o{font-family:var(--serif); font-size:1.5rem; color:var(--gold2); width:44px; text-align:center; flex:none}
.learnrow .info{flex:1; min-width:0}
.learnrow .info .nm{font-family:var(--serif); color:var(--cream); font-size:1.05rem}
.learnrow .info .pg{font-size:.8rem; color:rgba(247,243,232,.62); margin-top:2px}
/* ---------- drills ---------- */
.themecard{cursor:pointer; background:var(--glass); border:1px solid var(--hair-soft); border-radius:14px; padding:18px; transition:.16s; text-align:left; color:var(--cream); font-family:var(--sans)}
.themecard:hover{transform:translateY(-3px); border-color:var(--hair); background:var(--glass-strong)}
.themecard h3{font-family:var(--serif); color:var(--cream); margin:0 0 6px; font-size:1.12rem}
.themecard p{margin:0 0 10px; font-size:.8rem; color:rgba(247,243,232,.62)}
.facestrip{display:flex}
.facestrip img{width:34px; height:34px; border-radius:7px; object-fit:cover; border:2px solid var(--navy); margin-right:-8px; box-shadow:0 0 0 1px var(--gold)}
/* ---------- mobile / touch ---------- */
/* neutralize sticky hover + give tactile press feedback on touch devices */
@media (hover:none){
  .tile:hover,.pcard:hover,.chunk:hover,.themecard:hover{transform:none; background:var(--glass); border-color:var(--hair-soft)}
  .tlseg:hover{transform:none; filter:none}
  .opt:hover:not(:disabled){background:rgba(255,255,255,.045); border-color:var(--hair-soft)}
  .kbd{display:none}
}
.tile:active,.pcard:active,.chunk:active,.themecard:active{transform:scale(.985)}
.btn:active{filter:brightness(.92)}
.modes button:active{background:rgba(255,255,255,.1)}
.seg button:active{background:rgba(255,255,255,.12)}
.opt:active:not(:disabled){background:rgba(255,255,255,.12); border-color:var(--hair)}
.tlseg:active{filter:brightness(1.2)}
.seqrow .mv button:active{background:rgba(255,255,255,.16)}

@media (max-width:560px){
  .wrap{padding-left:16px; padding-right:16px}
  .panel{padding:18px}
  .opts{grid-template-columns:1fr}
  .statchip .s.hide-sm{display:none}
  .bar{gap:10px; padding:11px 16px}
  .brand h1{font-size:1.15rem}
  /* nav: every pill a real 44px target, all six stay visible (wraps) */
  nav.modes{padding:0 10px 10px; gap:6px}
  .modes button{min-height:44px; padding:11px 15px; font-size:.9rem}
  /* segmented controls */
  .seg button{min-height:42px; padding:11px 14px; font-size:.85rem}
  /* buttons */
  .btn{min-height:46px; padding:13px 18px}
  /* detail: portrait + meta stack cleanly, no min-width overflow */
  .detail{gap:16px}
  .detail .frame img{width:140px; height:170px}
  .detail .meta{min-width:0; flex-basis:100%}
  /* timeline: tappable segment floor + snap to each */
  .tlseg{min-width:30px; height:84px; scroll-snap-align:center; font-size:.82rem}
  /* sequence reorder arrows: from 30x22 to real tap targets */
  .seqrow{padding:10px}
  .seqrow .mv{gap:4px}
  .seqrow .mv button{width:42px; height:34px; font-size:1rem}
  .seqrow img{width:46px; height:46px}
  /* inputs: 16px kills iOS focus-zoom, 44px tap height */
  .tools{gap:8px}
  .tools input,.tools select{font-size:16px; min-height:44px; flex:1 1 140px}
  .typein{flex-wrap:wrap}
  .typein input{font-size:16px}

<script>
"use strict";
/* ============ derive slots & helpers ============ */
const SLOTS=[]; // 47 numbered positions -> person
PRES.forEach(p=>p.n.forEach(num=>SLOTS.push({num,p})));
SLOTS.sort((a,b)=>a.num-b.num);
const byNum=n=>SLOTS.find(s=>s.num===n).p;
const norm=s=>s.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();
const lastName=p=>p.name.split(" ").slice(-1)[0];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
function termDays(p){ // total days served across terms
  let d=0; (p.term.split("&")).forEach(seg=>{
    const m=seg.match(/(\d{4}).*?(\d{4}|present)/);
    if(m){const a=+m[1]; const b=m[2]==="present"?2026:+m[2]; d+=(b-a)*365.25;}
  }); return Math.round(d)||365;
}
const MAXDAYS=Math.max(...PRES.map(termDays));
const MINAGE=Math.min(...PRES.map(p=>p.age)), MAXAGE=Math.max(...PRES.map(p=>p.age));

/* ============ constants: parties, themes, scheduling ============ */
const PARTY_COLOR={
  "Unaffiliated":"#8a8f9c","Federalist":"#7a5b2e","Democratic-Republican":"#2e8b8b",
  "Democratic":"#1B4D8F","Whig":"#7d4f9e","Whig (then unaffiliated)":"#7d4f9e",
  "National Union / Democratic":"#5a6b7a","Republican":"#B22234"
};
const pcolor=p=>PARTY_COLOR[p.party]||"#8a8f9c";
const LEGEND=["Federalist","Democratic-Republican","Democratic","Whig","Republican","Unaffiliated"];
const THEMES=[
  {id:"rushmore",name:"The Rushmore Four",blurb:"Carved into Mount Rushmore as defining figures of the nation's first 150 years.",nums:[1,3,16,26]},
  {id:"founding",name:"The Founding Era",blurb:"The first six presidents — Revolutionary-generation leaders who built the office from scratch.",nums:[1,2,3,4,5,6]},
  {id:"died",name:"Died in Office",blurb:"Eight presidents died while serving — four from illness or age, four by assassination.",nums:[9,12,16,20,25,29,32,35]},
  {id:"assassinated",name:"Assassinated",blurb:"Four sitting presidents were killed by an assassin's bullet.",nums:[16,20,25,35]},
  {id:"impeached",name:"Impeached",blurb:"Three presidents were impeached by the House and acquitted by the Senate — Trump twice.",nums:[17,42,45]},
  {id:"nonconsec",name:"Non-Consecutive",blurb:"The only two presidents to serve split terms, each counted twice in the numbering.",nums:[22,24,45,47]}
];
const slotsFor=nums=>nums.map(n=>SLOTS.find(s=>s.num===n)).filter(Boolean);
const NONCONSEC=new Set([24,47]); // second-term slots that mark a return
function slotYears(slot){
  const segs=slot.p.term.split("&").map(s=>s.trim());
  let seg=segs[0];
  if(slot.p.n.length>1){const i=slot.p.n.indexOf(slot.num); seg=segs[i]||segs[0];}
  const m=seg.match(/(\d{4}).*?(\d{4}|present)/);
  if(!m)return 4; const a=+m[1], b=m[2]==="present"?2026:+m[2]; return Math.max(.4,b-a);
}
const CHUNK=5, NCHUNKS=Math.ceil(47/CHUNK);
const chunkNums=ci=>{const o=[];for(let n=ci*CHUNK+1;n<=Math.min(47,ci*CHUNK+CHUNK);n++)o.push(n);return o;};

/* ============ persistent state (time-based Leitner) ============ */
const KEY="potus-studio-v1";
const DAY=864e5;
const SRS_IV={1:6e5,2:DAY,3:3*DAY,4:7*DAY,5:21*DAY}; // ms until due after reaching each box
const defState=()=>({srs:{},learn:[],best:0,correct:0,wrong:0,sessions:0,
  cfg:{dir:"p2n",input:"mc",seqlen:8}});
let ST=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));return s&&s.srs?migrate(s):defState();}catch(e){return defState();}}
function migrate(s){ // old format stored srs[num] as an integer box
  for(const k in s.srs){if(typeof s.srs[k]==="number")s.srs[k]={box:s.srs[k],due:0};}
  if(!Array.isArray(s.learn))s.learn=[];
  return s;
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(ST));}catch(e){}}
const srsGet=num=>ST.srs[num]||{box:0,due:0};
const box=num=>srsGet(num).box;
function isDue(num){const s=srsGet(num);return s.box===0||Date.now()>=s.due;}
function dueCount(){return SLOTS.filter(s=>isDue(s.num)).length;}
function grade(num,ok){ // central SRS update + lifetime tally; returns nothing
  const b=ok?Math.min(5,box(num)+1):1;
  ST.srs[num]={box:b,due:Date.now()+SRS_IV[b]};
  if(ok)ST.correct++; else ST.wrong++; save();
}
function nextDueLabel(){
  const future=SLOTS.map(s=>srsGet(s.num)).filter(x=>x.box>0&&x.due>Date.now()).map(x=>x.due);
  if(!future.length)return null; const ms=Math.min(...future)-Date.now();
  if(ms<36e5)return Math.max(1,Math.round(ms/6e4))+" min"; 
  if(ms<DAY)return Math.round(ms/36e5)+" hr"; return Math.round(ms/DAY)+" days";
}
function refreshStats(){
  document.getElementById("stStreak").textContent=streak;
  const tot=ST.correct+ST.wrong;
  document.getElementById("stAcc").textContent=tot?Math.round(ST.correct/tot*100)+"%":"—";
  document.getElementById("stDue").textContent=dueCount();
}
let streak=0;

/* ============ router ============ */
const MODES=[
  ["home","Home"],["learn","Learn"],["practice","Practice"],
  ["drills","Drills"],["srs","Review"],["browse","Browse"]
];
const RENDER={home:Home,learn:Learn,practice:Practice,quiz:Quiz,flash:Flash,seq:Seq,succ:Succession,drills:Drills,srs:Srs,browse:Browse};
const NAVPARENT={quiz:"practice",flash:"practice",seq:"practice",succ:"practice"};
let mode="home";
const app=document.getElementById("app");
const nav=document.getElementById("modeNav");
MODES.forEach(([k,label])=>{const b=document.createElement("button");b.textContent=label;
  b.onclick=()=>go(k);b.dataset.k=k;nav.appendChild(b);});
document.getElementById("homeLink").onclick=e=>{e.preventDefault();go("home");};
function highlight(key){[...nav.children].forEach(b=>b.classList.toggle("active",b.dataset.k===key));}
function go(m){mode=m;highlight(NAVPARENT[m]||m);refreshStats();(RENDER[m]||Home)();window.scrollTo({top:0,behavior:"smooth"});}

/* ============ HOME (timeline hero) ============ */
function Home(){
  const learned=ST.learn.length, due=dueCount();
  app.innerHTML=`
  <div class="panel">
    <p class="eyebrow">The line of succession · 1789–present</p>
    <h2 class="display">Forty-seven presidencies, in order.</h2>
    <div class="timeline" id="tl"></div>
    <div class="tlhint">Each bar is one term — width scaled to years served, colored by party. &#8617; marks a return for a non-consecutive term. Tap any bar to open it.</div>
    <div class="tllegend" id="tlleg"></div>
    <div class="btn-row">
      <button class="btn gold" onclick="go('learn')">Learn the order</button>
      <button class="btn ghost" onclick="go('practice')">Practice</button>
      <button class="btn ghost" onclick="go('srs')">Review${due?` · ${due} due`:""}</button>
    </div>
  </div>
  <div class="panel">
    <p class="eyebrow">Where to next</p>
    <div class="tiles">
      ${tile("learn","Learn the order","Teach yourself in chunks of five, with portraits and memory pegs, then a quick check.",icLearn)}
      ${tile("practice","Practice","Quiz, succession chains, flashcards, and sequence drills — all in one place.",icQuiz)}
      ${tile("drills","Themed drills","Rushmore, assassinated, impeached, died in office, and more focused sets.",icStar)}
      ${tile("srs","Review (SRS)","Time-scheduled spaced repetition resurfaces slots exactly when you're due.",icSrs)}
      ${tile("browse","Browse","Searchable reference for all 47 — full records, portraits, comparison bars.",icBrowse)}
    </div>
    <hr class="hr">
    <div class="center">
      <button class="btn ghost" onclick="resetAll()">Reset all progress</button>
      <p class="note">On-device only. Learned ${learned}/${NCHUNKS} chunks · ${ST.correct} correct · ${ST.wrong} missed · ${ST.sessions} sessions.</p>
    </div>
  </div>`;
  buildTimeline();
}
function buildTimeline(){
  const tl=document.getElementById("tl"); if(!tl)return;
  const maxY=Math.max(...SLOTS.map(slotYears));
  tl.innerHTML="";
  SLOTS.forEach(s=>{
    const b=document.createElement("button");
    b.className="tlseg"+(NONCONSEC.has(s.num)?" nc":"");
    const w=Math.round(16+ slotYears(s)/maxY*54); // 16–70px by term length
    b.style.width=w+"px"; b.style.background=pcolor(s.p);
    b.title=`#${s.num} ${s.p.name} · ${s.p.party} · ${s.p.term}`;
    b.setAttribute("aria-label",b.title);
    b.innerHTML=`<span class="tlnum">${s.num}</span>`;
    b.onclick=()=>detail(s.num);
    tl.appendChild(b);
  });
  const leg=document.getElementById("tlleg");
  leg.innerHTML=LEGEND.map(p=>`<span><i style="background:${PARTY_COLOR[p]}"></i>${p}</span>`).join("");
}
const tile=(k,h,p,ic)=>`<button class="tile" onclick="go('${k}')"><div class="ic">${ic}</div><h3>${h}</h3><p>${p}</p></button>`;
function resetAll(){if(confirm("Clear all saved progress, learning, and SRS history on this device?")){ST=defState();streak=0;save();go("home");}}

/* ============ QUIZ ============ */
let quiz=null;
function Quiz(){
  const c=ST.cfg;
  app.innerHTML=`
  <div class="panel">
    <p class="eyebrow">Quiz</p>
    <h2 class="display">Set it up</h2>
    <p class="cfg-label">Direction</p>
    <div class="seg" id="segDir">
      ${segBtn("dir","p2n","President → number",c.dir)}
      ${segBtn("dir","n2p","Number → president",c.dir)}
      ${segBtn("dir","p2party","President → party",c.dir)}
    </div>
    <p class="cfg-label">Answering</p>
    <div class="seg" id="segIn">
      ${segBtn("input","mc","Multiple choice",c.input)}
      ${segBtn("input","type","Type it (hard)",c.input)}
    </div>
    <div class="btn-row"><button class="btn gold" onclick="startQuiz()">Begin · 12 questions</button></div>
    <p class="note">Wrong answers come back around sooner in the round (adaptive). Cleveland &amp; Trump accept either of their two numbers.</p>
  </div>`;
  segWire();
}
function segBtn(group,val,label,cur){return `<button data-g="${group}" data-v="${val}" class="${cur===val?'on':''}">${label}</button>`;}
function segWire(){document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{
  const g=b.dataset.g; ST.cfg[g]=b.dataset.v; save();
  b.parentElement.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.v===b.dataset.v));
});}
function startQuiz(poolSlots){
  const base=(poolSlots&&poolSlots.length)?poolSlots:SLOTS;
  const n=Math.min(12,base.length);
  const pool=shuffle(base.slice()).slice(0,n);
  quiz={queue:pool.slice(),done:0,total:pool.length,right:0,t0:Date.now()};
  ST.sessions++; save(); nextQuiz();
}
function nextQuiz(){
  if(!quiz.queue.length){return quizDone();}
  const slot=quiz.queue.shift(); quiz.cur=slot;
  const c=ST.cfg; const p=slot.p;
  let prompt,portrait="";
  if(c.dir==="n2p"){prompt=`<div class="ord-big">#${slot.num}</div><p class="sub center">Who was the ${ordinal(slot.num)} president?</p>`;}
  else {portrait=`<img class="q-portrait" src="${p.img}" alt="">`;
    const ask=c.dir==="p2n"?`What number president was`:`What party was`;
    prompt=`${portrait}<div class="q-prompt">${p.name}</div><p class="sub center">${ask} ${c.dir==='p2n'?'this?':'he?'}</p>`;}
  const pct=Math.round(quiz.done/quiz.total*100);
  app.innerHTML=`<div class="panel q-card">
    <div class="progressbar"><i style="width:${pct}%"></i></div>
    <div style="font-size:.74rem;color:rgba(247,243,232,.5);letter-spacing:.1em">QUESTION ${quiz.done+1} / ${quiz.total} · SCORE ${quiz.right} · <span id="qTimer">0:00</span></div>
    ${prompt}
    <div id="qBody"></div>
    <div class="feedback" id="qFb"></div>
    <div id="qNext"></div>
  </div>`;
  startTimer();
  c.input==="type"?renderType(slot):renderMC(slot);
}
function renderMC(slot){
  const c=ST.cfg,p=slot.p; let correct,opts;
  if(c.dir==="p2n"){correct=slot.num; opts=distractNums(slot);}
  else if(c.dir==="n2p"){correct=p.name; opts=distractNames(p);}
  else {correct=p.party; opts=distractParty(p);}
  const body=document.getElementById("qBody");
  const grid=document.createElement("div");grid.className="opts";
  shuffle(opts).forEach(o=>{const b=document.createElement("button");b.className="opt";
    b.textContent=c.dir==="p2n"?("#"+o):o;
    b.onclick=()=>answerMC(b,o,correct,slot,grid);grid.appendChild(b);});
  body.appendChild(grid);
}
function answerMC(btn,val,correct,slot,grid){
  const ok=(slot.p.n.includes(val))|| val===correct || (ST.cfg.dir==="p2n"&&slot.p.n.includes(+val));
  [...grid.children].forEach(b=>{b.disabled=true;
    const bv=ST.cfg.dir==="p2n"?+b.textContent.replace('#',''):b.textContent;
    const isCorr=ST.cfg.dir==="p2n"?slot.p.n.includes(bv):bv===correct;
    if(isCorr)b.classList.add("correct");});
  if(!ok)btn.classList.add("wrong");
  resolve(ok,slot);
}
function renderType(slot){
  const c=ST.cfg;
  const body=document.getElementById("qBody");
  const wrap=document.createElement("div");wrap.className="typein";
  wrap.innerHTML=`<input id="qIn" autocomplete="off" ${c.dir==='p2n'?'inputmode="numeric"':''} placeholder="${c.dir==='p2n'?'Enter a number':c.dir==='n2p'?'Last name is fine':'Party'}"><button class="btn primary" id="qSub">Check</button>`;
  body.appendChild(wrap);
  const inp=wrap.querySelector("#qIn");inp.focus();
  const submit=()=>{
    const v=inp.value; let ok;
    if(c.dir==="p2n"){ok=slot.p.n.includes(parseInt(v,10));}
    else if(c.dir==="n2p"){const g=norm(v);ok=g===norm(slot.p.name)||g===norm(lastName(slot.p))|| (g.length>3&&norm(slot.p.name).includes(g));}
    else{ok=norm(v)&&norm(slot.p.party).includes(norm(v));}
    inp.disabled=true;wrap.querySelector("#qSub").disabled=true;resolve(ok,slot);
  };
  wrap.querySelector("#qSub").onclick=submit;
  inp.onkeydown=e=>{if(e.key==="Enter")submit();};
}
function resolve(ok,slot){
  stopTimer();
  const p=slot.p;
  if(ok){quiz.right++;streak++;ST.best=Math.max(ST.best,streak);}
  else{streak=0;quiz.queue.splice(Math.min(3,quiz.queue.length),0,slot);} // adaptive: resurface soon
  grade(slot.num,ok); // central SRS update + lifetime tally
  const nums=p.n.map(n=>"#"+n).join(" & ");
  document.getElementById("qFb").innerHTML= ok
    ? `<span class="ok">Correct.</span> ${p.name} — ${nums}, ${p.party}, ${p.term}.`
    : `<span class="no">Not quite.</span> ${p.name} was ${nums} (${p.party}, ${p.term}).`;
  quiz.done++;
  const nx=document.getElementById("qNext");
  const b=document.createElement("button");b.className="btn gold";
  b.textContent=quiz.queue.length?"Next":"See results";b.onclick=nextQuiz;
  b.style.marginTop="6px";nx.appendChild(b);b.focus();
  refreshStats();
}
function quizDone(){
  const secs=Math.round((Date.now()-quiz.t0)/1000);
  const acc=Math.round(quiz.right/quiz.total*100);
  app.innerHTML=`<div class="panel center">
    <p class="eyebrow">Round complete</p>
    <div class="ord-big">${acc}%</div>
    <p class="sub" style="margin:6px auto">${quiz.right} of ${quiz.total} correct in ${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')} · best streak ${ST.best}</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn gold" onclick="go('quiz')">Again</button>
      <button class="btn ghost" onclick="go('srs')">Review weak slots</button>
    </div></div>`;
}
let timer=null,tStart=0;
function startTimer(){tStart=Date.now();timer=setInterval(()=>{const el=document.getElementById("qTimer");
  if(!el)return;const s=Math.round((Date.now()-quiz.t0)/1000);el.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,'0');},500);}
function stopTimer(){clearInterval(timer);}
const ordinal=n=>{const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};
function distractNums(slot){const set=new Set(slot.p.n);const out=[slot.num];
  while(out.length<4){const d=Math.max(1,Math.min(47,slot.num+(Math.floor(Math.random()*13)-6)));
    if(!set.has(d)&&!out.includes(d)){out.push(d);}}return out;}
function distractNames(p){const out=[p.name];const idx=SLOTS.findIndex(s=>s.p===p);
  const near=SLOTS.map((s,i)=>[s.p,Math.abs(i-idx)]).filter(x=>x[0]!==p);
  near.sort((a,b)=>a[1]-b[1]);const pool=[...new Set(near.slice(0,10).map(x=>x[0].name))];
  shuffle(pool).slice(0,3).forEach(n=>out.push(n));return out;}
function distractParty(p){const all=[...new Set(PRES.map(x=>x.party))];const out=[p.party];
  shuffle(all.filter(x=>x!==p.party)).slice(0,3).forEach(x=>out.push(x));return out;}

function Flash(pool){startFlash(pool);}

}

function showGrade(){

function gradeFlash(ok){

/* ============ SEQUENCE ============ */
let seq=null;
function Seq(){
  const len=ST.cfg.seqlen;
  app.innerHTML=`<div class="panel">
    <p class="eyebrow">Sequence</p>
    <h2 class="display">Put them in order</h2>
    <p class="sub">Arrange the shuffled presidents from earliest to latest. Use the arrows or tap two rows to swap, then check.</p>
    <p class="cfg-label">Length</p>
    <div class="seg" id="segLen">
      ${[5,8,12].map(n=>`<button data-n="${n}" class="${len===n?'on':''}">${n} cards</button>`).join("")}
    </div>
    <div class="btn-row"><button class="btn gold" onclick="startSeq()">Deal</button></div>
  </div>`;
  document.querySelectorAll('#segLen button').forEach(b=>b.onclick=()=>{
    ST.cfg.seqlen=+b.dataset.n;save();
    document.querySelectorAll('#segLen button').forEach(x=>x.classList.toggle('on',x===b));});
}
function startSeq(){
  const picks=shuffle(SLOTS.slice()).slice(0,ST.cfg.seqlen);
  // ensure unique people-ordinals; sort target by num
  const target=picks.slice().sort((a,b)=>a.num-b.num);
  seq={items:shuffle(picks.slice()),target,sel:null,checked:false};
  drawSeq();
}
function drawSeq(){
  app.innerHTML=`<div class="panel">
    <p class="eyebrow">Sequence · earliest → latest</p>
    <div class="seqlist" id="seqList"></div>
    <div class="btn-row" style="justify-content:center" id="seqCtrl"></div>
    <div class="feedback center" id="seqFb"></div>
  </div>`;
  const list=document.getElementById("seqList");
  seq.items.forEach((s,i)=>{
    const row=document.createElement("div");row.className="seqrow";row.dataset.i=i;
    if(seq.sel===i)row.classList.add("sel");
    if(seq.checked){row.classList.add(s.num===seq.target[i].num?"ok":"bad");}
    row.innerHTML=`<div class="mv"><button aria-label="up">▲</button><button aria-label="down">▼</button></div>
      <img src="${s.p.img}" alt=""><div class="nm">${s.p.name}${seq.checked?` <span style="color:var(--gold2)">#${s.num}</span>`:""}</div>
      ${seq.checked?`<div class="badge">${i+1}</div>`:""}`;
    const[up,dn]=row.querySelectorAll(".mv button");
    up.onclick=e=>{e.stopPropagation();move(i,-1);};
    dn.onclick=e=>{e.stopPropagation();move(i,1);};
    if(!seq.checked)row.onclick=()=>pick(i);
    list.appendChild(row);
  });
  const ctrl=document.getElementById("seqCtrl");
  ctrl.innerHTML= seq.checked
    ? `<button class="btn gold" onclick="startSeq()">New deal</button>`
    : `<button class="btn gold" onclick="checkSeq()">Check order</button>`;
}
function move(i,d){if(seq.checked)return;const j=i+d;if(j<0||j>=seq.items.length)return;
  [seq.items[i],seq.items[j]]=[seq.items[j],seq.items[i]];seq.sel=null;drawSeq();}
function pick(i){if(seq.sel===null){seq.sel=i;}else if(seq.sel===i){seq.sel=null;}
  else{[seq.items[seq.sel],seq.items[i]]=[seq.items[i],seq.items[seq.sel]];seq.sel=null;}drawSeq();}
function checkSeq(){seq.checked=true;
  let right=0;seq.items.forEach((s,i)=>{if(s.num===seq.target[i].num)right++;});
  ST.correct+=right;ST.wrong+=(seq.items.length-right);save();refreshStats();drawSeq();
  document.getElementById("seqFb").innerHTML=`<span class="ok" style="color:var(--gold2)">${right} / ${seq.items.length} in the right spot.</span>`;
}

function Srs(){
  const counts=[0,0,0,0,0,0];SLOTS.forEach(s=>counts[box(s.num)]++);
  const due=SLOTS.filter(s=>isDue(s.num));
  const nd=nextDueLabel();

    ${due.length
      ? `<div class="btn-row"><button class="btn gold" onclick="startSrs()">Review ${due.length} now</button></div>
         <p class="note">A correct answer schedules the slot further out (10 min &rarr; 1 &rarr; 3 &rarr; 7 &rarr; 21 days); a miss brings it back fast. Mastered slots still return when their interval lapses.</p>`
      : `<div class="empty"><div class="ic">${icSrs}</div>${nd?`You're caught up. Next slot comes due in about ${nd}.`:`Run Learn or a Quiz to seed your deck.`}</div>`}
  </div>`;
}
function startSrs(){
  srs={queue:shuffle(SLOTS.filter(s=>isDue(s.num))),reveal:false}; drawSrs();
}
function drawSrs(){
  if(!srs.queue.length){return Srs();}
  const slot=srs.queue[0],p=slot.p;
  app.innerHTML=`<div class="panel q-card">
    <p class="eyebrow">${srs.queue.length} left · box ${box(slot.num)}/5</p>
    <img class="q-portrait" src="${p.img}" alt="">
    <div class="q-prompt">${p.name}</div>
    <div id="srsBody"></div>
  </div>`;
  const body=document.getElementById("srsBody");
  if(!srs.reveal){
    body.innerHTML=`<p class="sub center">What number(s) and party?</p>
      <div class="btn-row" style="justify-content:center"><button class="btn ghost" onclick="srsReveal()">Reveal</button></div>`;
  }else{
    body.innerHTML=`<div class="ord-big">${p.n.map(n=>'#'+n).join(' & ')}</div>
      <p class="sub center">${p.party} · ${p.term}</p>
      <div class="hookbox" style="max-width:440px;margin:14px auto 0">${p.hook}</div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn gold" onclick="srsGrade(true)">Knew it</button>
        <button class="btn ghost" onclick="srsGrade(false)">Missed</button></div>`;
  }
}
function srsReveal(){srs.reveal=true;drawSrs();}
function srsGrade(ok){
  const slot=srs.queue.shift();
  grade(slot.num,ok);
  if(!ok)srs.queue.push(slot); // miss requeues within this session
  srs.reveal=false; refreshStats(); drawSrs();

function pickOther(p,k){
  const idx=SLOTS.findIndex(s=>s.p===p);
  const near=SLOTS.map((s,i)=>[s.p,Math.abs(i-idx)]).filter(x=>x[0]!==p);
  near.sort((a,b)=>a[1]-b[1]);
  const uniq=[],seen=new Set([p.name]);
  for(const [pp] of near){if(!seen.has(pp.name)){seen.add(pp.name);uniq.push(pp);}if(uniq.length>=k+5)break;}
  return shuffle(uniq).slice(0,k);
}

/* ============ LEARN the order ============ */
let learn=null;
function Learn(){
  app.innerHTML=`<div class="panel">
    <p class="eyebrow">Learn the order</p>
    <h2 class="display">Five at a time</h2>
    <p class="sub">Work through the line in small groups. Each set shows the number, portrait, party, and a memory peg &mdash; then a quick check before you move on.</p>

  const c=document.getElementById("chunks");
  for(let ci=0;ci<NCHUNKS;ci++){
    const nums=chunkNums(ci), done=ST.learn.includes(ci);
    const names=nums.map(n=>lastName(byNum(n))).join(", ");
    const b=document.createElement("button");b.className="chunk";
    b.innerHTML=`${done?'<span class="done">\u2713</span>':''}<div class="rng">#${nums[0]}\u2013#${nums[nums.length-1]}</div><div class="who">${names}</div>`;
    b.onclick=()=>learnChunk(ci);
    c.appendChild(b);
  }
}
function learnChunk(ci){
  const nums=chunkNums(ci);
  app.innerHTML=`<div class="panel">
    <button class="btn ghost" onclick="go('learn')" style="margin-bottom:16px">&larr; All sets</button>
    <p class="eyebrow">Set ${ci+1} of ${NCHUNKS}</p>
    <h2 class="display">Presidents #${nums[0]}&ndash;#${nums[nums.length-1]}</h2>
    <div>${nums.map(n=>{const p=byNum(n);return `<div class="learnrow">
      <div class="o">${n}</div><img src="${p.img}" alt="">
      <div class="info"><div class="nm">${p.name}</div>
      <div class="pg">${p.party} &middot; ${p.term}</div>
      <div class="pg" style="color:var(--gold2)">${p.mnem}</div></div></div>`;}).join("")}</div>
    <div class="btn-row">
      <button class="btn gold" onclick="startLearnCheck(${ci})">Quick check &rarr;</button>
      <button class="btn ghost" onclick="startFlash(slotsFor([${nums.join(",")}]))">Flashcards</button>
    </div>
  </div>`;
}
function startLearnCheck(ci){
  learn={ci,queue:shuffle(slotsFor(chunkNums(ci))),total:chunkNums(ci).length,done:0,right:0};
  learnQ();
}
function learnQ(){
  if(!learn.queue.length)return learnDone();
  const slot=learn.queue.shift(),p=slot.p;
  const opts=shuffle([p,...pickOther(p,3)]);
  app.innerHTML=`<div class="panel q-card">
    <p class="eyebrow">Check &middot; ${learn.done+1}/${learn.total}</p>
    <div class="ord-big">#${slot.num}</div>
    <p class="sub center">Who held this number?</p>
    <div class="opts" id="lOpts"></div>
    <div class="feedback" id="lFb"></div>
    <div id="lNext"></div>
  </div>`;
  const grid=document.getElementById("lOpts");
  opts.forEach(pp=>{const b=document.createElement("button");b.className="opt";b.textContent=pp.name;
    b.onclick=()=>learnAnswer(b,pp,slot,grid);grid.appendChild(b);});
}
function learnAnswer(btn,pp,slot,grid){
  const ok=pp===slot.p;
  [...grid.children].forEach(b=>{b.disabled=true;if(b.textContent===slot.p.name)b.classList.add("correct");});
  if(!ok)btn.classList.add("wrong");
  grade(slot.num,ok); if(ok)learn.right++; learn.done++;
  document.getElementById("lFb").innerHTML=ok?`<span class="ok">Yes &mdash; ${slot.p.name}.</span>`:`<span class="no">It was ${slot.p.name}.</span>`;
  const b=document.createElement("button");b.className="btn gold";
  b.textContent=learn.queue.length?"Next":"Finish set";b.onclick=learnQ;
  document.getElementById("lNext").appendChild(b);b.focus();refreshStats();
}
function learnDone(){
  if(!ST.learn.includes(learn.ci)){ST.learn.push(learn.ci);save();}
  const more=learn.ci+1<NCHUNKS;
  app.innerHTML=`<div class="panel center">
    <p class="eyebrow">Set ${learn.ci+1} complete</p>
    <div class="ord-big">${learn.right}/${learn.total}</div>
    <p class="sub" style="margin:6px auto">Marked as learned. ${more?"Ready for the next five?":"That's the whole line \u2014 every set learned."}</p>
    <div class="btn-row" style="justify-content:center">
      ${more?`<button class="btn gold" onclick="learnChunk(${learn.ci+1})">Next set &rarr;</button>`:`<button class="btn gold" onclick="go('practice')">Practice now</button>`}
      <button class="btn ghost" onclick="go('learn')">All sets</button>
    </div></div>`;
}

/* ============ SUCCESSION ============ */
let succ=null;
function Succession(){
  app.innerHTML=`<div class="panel">
    <p class="eyebrow">Succession</p>
    <h2 class="display">Down the line</h2>
    <p class="sub">Ten questions on who followed whom &mdash; successors, predecessors, and fill-the-gap chains. The two non-consecutive presidents make for the trickiest gaps.</p>
    <div class="btn-row"><button class="btn gold" onclick="startSucc()">Begin</button>
      <button class="btn ghost" onclick="go('practice')">&larr; Practice</button></div>
  </div>`;
}
function startSucc(){
  const q=[],seen=new Set();
  let guard=0;
  while(q.length<10&&guard++<200){const it=makeSuccQ();const key=it.type+":"+it.ref;if(seen.has(key))continue;seen.add(key);q.push(it);}
  succ={queue:q,done:0,right:0,total:q.length}; ST.sessions++; save(); succQ();
}
function makeSuccQ(){
  const t=rnd(["next","prev","gap"]);
  if(t==="next"){const x=1+Math.floor(Math.random()*46);return {type:t,ref:x,target:x+1};}
  if(t==="prev"){const x=2+Math.floor(Math.random()*46);return {type:t,ref:x,target:x-1};}
  const x=2+Math.floor(Math.random()*45);return {type:"gap",ref:x,target:x};
}
function succQ(){
  if(!succ.queue.length)return succDone();
  const it=succ.queue.shift();
  const ansP=byNum(it.target);
  let prompt;
  if(it.type==="next"){const r=byNum(it.ref);prompt=`<div class="q-prompt">${r.name}</div><p class="sub center">#${it.ref} &mdash; who came <b>next</b>?</p>`;}
  else if(it.type==="prev"){const r=byNum(it.ref);prompt=`<div class="q-prompt">${r.name}</div><p class="sub center">#${it.ref} &mdash; who came <b>before</b>?</p>`;}
  else{const a=byNum(it.ref-1),c=byNum(it.ref+1);prompt=`<p class="q-prompt" style="font-size:1.2rem">${a.name} &nbsp;&rarr;&nbsp; <b style="color:var(--gold2)">?</b> &nbsp;&rarr;&nbsp; ${c.name}</p><p class="sub center">Fill the gap &mdash; #${it.ref}.</p>`;}
  const opts=shuffle([ansP,...pickOther(ansP,3)]);
  app.innerHTML=`<div class="panel q-card">
    <p class="eyebrow">Succession &middot; ${succ.done+1}/${succ.total} &middot; score ${succ.right}</p>
    ${prompt}
    <div class="opts" id="sOpts"></div>
    <div class="feedback" id="sFb"></div>
    <div id="sNext"></div>
  </div>`;
  const grid=document.getElementById("sOpts");
  opts.forEach(pp=>{const b=document.createElement("button");b.className="opt";b.textContent=pp.name;
    b.onclick=()=>succAnswer(b,pp,it,grid);grid.appendChild(b);});
}
function succAnswer(btn,pp,it,grid){
  const ansP=byNum(it.target),ok=pp===ansP;
  [...grid.children].forEach(b=>{b.disabled=true;if(b.textContent===ansP.name)b.classList.add("correct");});
  if(!ok)btn.classList.add("wrong");
  if(ok){succ.right++;streak++;ST.best=Math.max(ST.best,streak);}else{streak=0;}
  grade(it.target,ok);succ.done++;
  document.getElementById("sFb").innerHTML=ok?`<span class="ok">Correct &mdash; #${it.target} ${ansP.name}.</span>`:`<span class="no">It was #${it.target} ${ansP.name}.</span>`;
  const b=document.createElement("button");b.className="btn gold";
  b.textContent=succ.queue.length?"Next":"Results";b.onclick=succQ;
  document.getElementById("sNext").appendChild(b);b.focus();refreshStats();
}
function succDone(){
  const acc=Math.round(succ.right/succ.total*100);
  app.innerHTML=`<div class="panel center"><p class="eyebrow">Round complete</p>
    <div class="ord-big">${acc}%</div>
    <p class="sub" style="margin:6px auto">${succ.right} of ${succ.total} &middot; best streak ${ST.best}</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn gold" onclick="startSucc()">Again</button>
      <button class="btn ghost" onclick="go('practice')">Practice menu</button></div></div>`;
}

/* ============ DRILLS (themed) ============ */

    <p class="eyebrow">Themed drills</p>

    <p class="sub">Focused sets tied to what these leaders share. Study the group, then drill just those slots.</p>
    <div class="tiles" id="themes"></div>

}
